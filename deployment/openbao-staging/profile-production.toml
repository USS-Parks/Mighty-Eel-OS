# MAI deployment profile: openbao-staging (PRODUCTION MODE)
#
# Production posture on Windows via FileDev vault. Every demo shortcut
# (StubVault, MemoryAuditWriter, AcceptAllBundleVerifier, NullSealer,
# synthetic token exchange) is rejected. Real ML-DSA trust anchors and
# a signed bundle are required at boot.

[profile]
name = "openbao-staging"
mode = "production"
allow_demo_defaults = false
fail_closed = true

[paths]
state_dir  = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\state"
config_dir = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging"
log_dir    = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\logs"
run_dir    = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\state"
backup_dir = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\backups"

[vault]
backend                    = "file-dev"
root                       = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\state"
require_sealed_master_key  = true
require_pqc                = true
allow_stub                 = false

[audit]
api_writer                  = "wal"
compliance_writer           = "wal"
wal_dir                     = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\state"
require_hash_chain          = true
require_pqc_checkpoints     = true
require_encryption_at_rest  = true
allow_memory_writer         = false
allow_null_sealer           = false

[trust]
anchors_dir               = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\anchors"
bundle_cache_dir          = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\bundle-cache"
verifier                  = "ml-dsa"
allow_accept_all_verifier  = false
allow_local_dev_exchange  = false
require_trust_anchor      = true
require_bundle_on_boot    = true

[auth]
auth_keys_path                = "C:\\Users\\17076\\Documents\\Claude\\Island Mountain Mighty Eel OS\\mai\\deployment\\openbao-staging\\auth_keys.toml"
allow_internal_profile_header = false
require_nonempty_key_store    = true

[dashboard]
enabled                     = false
allow_default_admin_token   = false

[network]
bind_address                   = "127.0.0.1"
tls_mode                       = "direct"
require_forwarded_proto_header = false

[observability]
log_format       = "text"
log_rotation     = false
metrics_exporter = "none"
alerts_enabled   = false

[openbao]
address = "http://localhost:8200"
role_id = "8053c291-8f60-381f-e283-5e645e5907f4"
# secrets come from environment variables, NEVER from this file

[openbao.transit]
claim_signer_key      = "lamprey-claim-signer"
bundle_signer_key     = "lamprey-bundle-signer"
revocation_signer_key = "lamprey-revocation-signer"

[openbao.kv]
tenant_path     = "kv/tenants"
revocation_path = "kv/revocations"

[openbao.pki]
role = "mai-appliance"

[openbao.trust_refresh]
enabled       = true
interval_secs = 300
