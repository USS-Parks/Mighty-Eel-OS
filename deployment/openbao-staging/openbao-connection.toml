# OpenBao Connection — Staging Environment
# Used by mai-api for bootstrapping local trust cache in production posture.

[openbao]
address = "http://localhost:8200"
root_token = "root"  # dev only; use wrapped tokens in production

[auth.approle]
# Operator reference only — values below are NOT loaded by code.
# `OpenBaoBridgeConfig::staging()` reads these env vars at runtime:
#   OPENBAO_APPROLE_ROLE_ID            — AppRole role identifier
#   OPENBAO_APPROLE_SECRET_ID          — long-lived secret_id, OR
#   OPENBAO_APPROLE_WRAPPED_SECRET_ID  — single-use response-wrapped token
role_id = "<set via OPENBAO_APPROLE_ROLE_ID>"
# secret_id delivered via OPENBAO_APPROLE_WRAPPED_SECRET_ID — never commit literals

[transit]
claim_signer_key = "lamprey-claim-signer"
bundle_signer_key = "lamprey-bundle-signer"
revocation_signer_key = "lamprey-revocation-signer"

[kv]
tenant_path = "kv/tenants"
service_path = "kv/services"

[pki]
role = "mai-appliance"

[tenants]
demo_tenant_id = "tribal-health-demo"
