# OpenBao Connection — Staging Environment
# Used as a human-readable reference. Secrets are NOT stored here.
#
# Set before starting mai-api:
#   $env:MAI_OPENBAO_SECRET_ID = '<value>'
#
# Generate a fresh secret:
#   .\ir-respond.ps1 rotate-appliance

[openbao]
address = "http://localhost:8200"

[auth.approle]
role_id = "8053c291-8f60-381f-e283-5e645e5907f4"
# secret_id: MUST be set via MAI_OPENBAO_SECRET_ID env var. Never in source.

[transit]
claim_signer_key = "lamprey-claim-signer"
bundle_signer_key = "lamprey-bundle-signer"
revocation_signer_key = "lamprey-revocation-signer"

[kv]
tenant_path = "kv/tenants"
service_path = "kv/services"

[pki]
role = "mai-appliance"

[tenants]
demo_tenant_id = "tribal-health-demo"
