# MAI deployment profile: ship
#
# Customer-running production posture. This is the only profile that may
# be installed on a node sold or shipped to a regulated end-user. Every
# demo shortcut (StubVault, MemoryAuditWriter, AcceptAllBundleVerifier,
# NullSealer, synthetic token exchange, dashboard-dev, internal profile
# header) is rejected by the production guard when this profile is
# active.
#
# Selection: `MAI_SHIP_PROFILE=deployment/ship/profile.toml` plus
# `--config deployment/ship/profile.toml` (the env var engages the guard).
# Operators in real installs will point at /etc/mai/profile.toml instead.
#
# Scope: SHIP-01 added parsing only. Boot wiring lands in SHIP-02..SHIP-07.

[profile]
name = "ship"
mode = "production"
allow_demo_defaults = false
fail_closed = true

[paths]
state_dir  = "/var/lib/mai"
config_dir = "/etc/mai"
log_dir    = "/var/log/mai"
run_dir    = "/run/mai"
backup_dir = "/var/backups/mai"

[vault]
backend                    = "zfs"
root                       = "/var/lib/mai/vault"
require_sealed_master_key  = true
require_pqc                = true
allow_stub                 = false

[audit]
api_writer                  = "wal"
compliance_writer           = "wal"
wal_dir                     = "/var/lib/mai/audit"
require_hash_chain          = true
require_pqc_checkpoints     = true
require_encryption_at_rest  = true
allow_memory_writer         = false
allow_null_sealer           = false

[trust]
anchors_dir              = "/etc/mai/trust-anchors"
bundle_cache_dir         = "/var/lib/mai/trust"
verifier                 = "ml-dsa"
allow_accept_all_verifier = false
allow_local_dev_exchange = false
require_trust_anchor     = true
require_bundle_on_boot   = true

[auth]
auth_keys_path                = "/etc/mai/auth_keys.toml"
allow_internal_profile_header = false
require_nonempty_key_store    = true

[dashboard]
enabled                     = true
allow_default_admin_token   = false
# EnvironmentFile generated by the package postinstall; the runtime
# guard (PROD-DASH-100) refuses a missing, empty, or default token.
admin_token_file            = "/etc/mai/dashboard.env"

[network]
bind_address                   = "127.0.0.1"
tls_mode                       = "reverse-proxy-required"
require_forwarded_proto_header = false

[observability]
log_format       = "json"
log_rotation     = true
metrics_exporter = "prometheus"
alerts_enabled   = true
