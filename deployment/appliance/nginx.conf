server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API proxies. The trailing slash on proxy_pass strips the
    # /api/wsf/ (resp. /api/aog/) prefix, so /api/wsf/v1/tokens/verify becomes
    # /v1/tokens/verify at the wsf-api service.
    location /api/wsf/ {
        proxy_pass http://wsf-api:8300/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/aog/ {
        proxy_pass http://aog-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
