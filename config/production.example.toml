# MAI production config template (annotated)
#
# Copy this file to /etc/mai/profile.toml on a real install, then edit
# the paths and tenant identifiers for the site. Every comment marked
# `[contract]` is a guarantee the production guard enforces — do not
# disable those without coordination with the security review owner.
#
# Profile schema source of truth: mai-api/src/ship_profile.rs.
# Doc:                            mai/docs/SHIP-PROFILE.md.

[profile]
# [contract] name must be "ship" for any node delivered to a customer.
name = "ship"
# [contract] mode must be "production". Any other value disables the
# fail-closed guard.
mode = "production"
# [contract] demo defaults are rejected.
allow_demo_defaults = false
# [contract] fail-closed must be on. If a required component is
# unavailable at boot, the server refuses to listen.
fail_closed = true

[paths]
# Persistent state lives here. ZFS recommended for the vault subdir.
state_dir  = "/var/lib/mai"
# Operator-edited config + key material lives here.
config_dir = "/etc/mai"
# JSON logs are written here when the systemd file sink is in use.
log_dir    = "/var/log/mai"
# tmpfs runtime sockets / pid files.
run_dir    = "/run/mai"
# mai-admin backup output target.
backup_dir = "/var/backups/mai"

[vault]
# [contract] real vault backend. "stub" is rejected in ship mode.
# Reference deployment is "zfs"; "file-dev" exists for tests only.
backend                   = "zfs"
root                      = "/var/lib/mai/vault"
require_sealed_master_key = true
require_pqc               = true
allow_stub                = false

[audit]
# [contract] writers must be "wal" in ship mode. "memory" is rejected.
api_writer        = "wal"
compliance_writer = "wal"
wal_dir           = "/var/lib/mai/audit"
# [contract] hash chain + PQC checkpoints + AEAD at rest are required.
require_hash_chain         = true
require_pqc_checkpoints    = true
require_encryption_at_rest = true
allow_memory_writer        = false
allow_null_sealer          = false

[trust]
# Trust anchor public material lives here. Operators rotate via the
# documented runbook in docs/TRUST-BRIDGE-PRODUCTION.md (SHIP-15).
anchors_dir      = "/etc/mai/trust-anchors"
bundle_cache_dir = "/var/lib/mai/trust"
# [contract] verifier must be "ml-dsa" in ship mode.
verifier                  = "ml-dsa"
allow_accept_all_verifier = false
# [contract] no synthetic local-dev exchange in ship mode.
allow_local_dev_exchange  = false
require_trust_anchor      = true
require_bundle_on_boot    = true

[auth]
auth_keys_path                = "/etc/mai/auth_keys.toml"
# [contract] the internal profile header bypass is rejected.
allow_internal_profile_header = false
# [contract] the key store must contain at least one entry.
require_nonempty_key_store    = true

[dashboard]
enabled                   = true
# [contract] the dashboard-dev default token is rejected.
allow_default_admin_token = false
# [contract] the admin token is generated at install and measured at
# runtime (PROD-DASH-100); a missing, empty, or default token fails.
admin_token_file          = "/etc/mai/dashboard.env"

[network]
# Loopback only — TLS terminates at the reverse proxy.
bind_address                   = "127.0.0.1"
tls_mode                       = "reverse-proxy-required"
require_forwarded_proto_header = false

[observability]
log_format       = "json"
log_rotation     = true
metrics_exporter = "prometheus"
alerts_enabled   = true
