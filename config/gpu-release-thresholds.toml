# SHIP-13: benchmark thresholds for the GPU release gate.
#
# Source of truth for the `bench_compare.py gate` subcommand. Lists every
# benchmark that MUST appear in a release-grade bench run, plus the
# acceptable per-iteration latency bounds and the regression policy
# applied against the previous stored run.
#
# Bench names mirror the `name` strings emitted by
# `mai-adapters/tests/benchmarks.rs::BenchmarkResult`. The
# `tools/gpu_release_tests/` static suite asserts this file stays in
# sync with the Rust source.

[policy]
# Max % slower than the previous stored run before the gate fails.
# Mirrors the advisory `REGRESSION_THRESHOLD` in bench_compare.py
# (0.20 = 20%) so the gate matches the human-readable compare output
# unless the workflow overrides it via --regression-pct.
regression_pct = 20

# When true, a benchmark whose `target_us` is 0 (informational-only,
# such as memory or scaling sweeps) is still required to RUN but its
# per-iter latency does not gate the build. Set to false in stricter
# release profiles.
allow_zero_target = true

# When true, any [[benchmark]] entry with required=true that is absent
# from the latest stored run causes the gate to exit code 3.
fail_on_missing = true

# When true, benchmarks present in the run but not declared here are
# treated as an unknown-name violation (gate exit 2). Set to false
# during local iteration to allow ad-hoc benchmarks.
fail_on_unknown = false

# ─── Required release-gating benchmarks ────────────────────────────────
#
# The eight benchmarks. min_us is informational (a result
# faster than this gets logged as "suspiciously fast"); max_us is the
# hard ceiling — exceeding it fails the gate.

[[benchmark]]
name        = "throughput_routes_per_sec"
required    = true
max_us      = 100
min_us      = 0
description = "Scheduler routing throughput proxy. <100us/iter = >10k routes/sec."

[[benchmark]]
name        = "ttft_framework_overhead"
required    = true
max_us      = 1000
min_us      = 0
description = "Framework-side TTFT (request arrival to adapter selection)."

[[benchmark]]
name        = "framework_overhead_per_request"
required    = true
max_us      = 5000
min_us      = 0
description = "End-to-end MAI framework overhead per inference request."

[[benchmark]]
name        = "memory_overhead_adapters"
required    = true
max_us      = 0
min_us      = 0
description = "Heap residency delta per request. Informational (target_us=0)."

[[benchmark]]
name        = "concurrent_scaling"
required    = true
max_us      = 0
min_us      = 0
description = "Concurrent request scaling curve. Informational (target_us=0)."

[[benchmark]]
name        = "sentinel_wake_latency"
required    = true
max_us      = 1000
min_us      = 0
description = "Power state machine wake latency (software path)."

[[benchmark]]
name        = "model_load_time"
required    = true
max_us      = 200_000
min_us      = 0
description = "Registry + vault load. <200ms with 50ms simulated I/O."

[[benchmark]]
name        = "hotswap_latency"
required    = true
max_us      = 100_000
min_us      = 0
description = "Drain + replace adapter under load. <100ms."
