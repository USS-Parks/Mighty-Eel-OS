# MAI Compliance Report Generator Configuration
#
# Loaded by mai_compliance::reports::ReportManagerBuilder at startup.
# Deserialises into PruneConfig (retention) plus a list of default
# ReportSchedule entries.
#
# Per-report-type retention overrides the default; report types not
# listed fall back to default_retention_days.

[prune]
# Default retention: 7 years (HIPAA minimum). Overrides per type live
# in [prune.retention_by_type].
default_retention_days = 2555

[prune.retention_by_type]
# HIPAA audit trail — HIPAA minimum is 6 years; we keep 7 to match
# the audit log.
hipaa_audit_trail = 2555
# ITAR/EAR records — DDTC and BIS typically require 5 years; we
# match the audit log.
itar_compliance_summary = 2555
# OCAP — tribal data sovereignty agreements may require longer
# retention; default to 10 years for safety.
ocap_governance = 3650
# Operations-only — shorter horizon is fine.
system_activity = 365
# Executive digests — keep for the same period as the underlying
# audit log.
monthly_digest = 2555

# Watermark applied to certified reports. The dashboard renders this
# on the certification page.
[certification]
watermark = "Generated by Island Mountain MAI — Lamprey Compliance Layer"

# Pre-registered schedules. Each schedule fires when its `period_secs`
# elapses; the manager queries audit entries with timestamps in
# [now - window_secs, now]. Set `paused = true` to disable a schedule
# without removing it.

[[schedules]]
id = "hipaa-daily"
report_type = "hipaa_audit_trail"
format = "json"
period_secs = 86400
window_secs = 86400
protected_outputs = false
paused = true

[[schedules]]
id = "itar-weekly"
report_type = "itar_compliance_summary"
format = "json"
period_secs = 604800
window_secs = 604800
protected_outputs = false
paused = true

[[schedules]]
id = "ocap-weekly"
report_type = "ocap_governance"
format = "json"
period_secs = 604800
window_secs = 604800
protected_outputs = false
paused = true

[[schedules]]
id = "activity-hourly"
report_type = "system_activity"
format = "json"
period_secs = 3600
window_secs = 3600
protected_outputs = false
paused = true

[[schedules]]
id = "monthly-digest"
report_type = "monthly_digest"
format = "json"
period_secs = 2592000
window_secs = 2592000
protected_outputs = true
paused = true
