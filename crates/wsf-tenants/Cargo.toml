hex = "0.4"

[dev-dependencies]
wsf-cache = { path = "../wsf-cache" }
fabric-cache = { path = "../fabric-cache" }
fabric-proof = { path = "../fabric-proof" }
tokio = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

