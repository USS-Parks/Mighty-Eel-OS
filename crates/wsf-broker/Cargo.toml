fabric-crypto = { path = "../fabric-crypto" }
fabric-token = { path = "../fabric-token" }
wsf-bridge = { path = "../wsf-bridge" }
tokio = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
percent-encoding = "2"

[dev-dependencies]
axum = { workspace = true }

