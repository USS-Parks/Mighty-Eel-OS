[package]
name = "aog-wire"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
aog-store = { path = "../aog-store" }
openraft = { version = "0.9", features = ["serde", "storage-v2"] }
axum = { workspace = true }
