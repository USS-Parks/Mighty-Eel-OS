[package]
name = "mai-router"
description = "Lamprey Query Router: local vs cloud routing with sensitivity classification, entity detection, and budget enforcement"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { workspace = true }
