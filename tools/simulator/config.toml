[hardware]
num_gpus = 1
vram_per_gpu_gb = 0.1
max_batch_size = 64
base_step_time_ms = 50.0
scaling_factor_ms = 5.0
topology_cost = 1.0

[workload]
type = "mixed"
arrival_rate = 20.0
chat_ratio = 0.5
session_length_mean = 3.0
session_length_std = 1.0
chat_prompt_tokens_mean = 3000
chat_prompt_tokens_std = 1500
chat_max_tokens_mean = 2000
chat_max_tokens_std = 1000
chat_reuse_rate = 0.3
batch_prompt_tokens_mean = 8000
batch_prompt_tokens_std = 4000
batch_max_tokens_mean = 2000
batch_max_tokens_std = 1000

[kv_policy]
default = "heuristic"
min_residency_time_sec = 30.0
recently_evicted_penalty_sec = 10.0

[kv_policy.weights]
idle = 0.4
size = 0.3
priority = 0.3
batch = 0.3

[experiments]
run_policy_comparison = true
run_memory_sweep = true
run_workload_mix = true
run_burst_load = true
run_weight_sensitivity = true
sim_time_sec = 30
seed = 42
