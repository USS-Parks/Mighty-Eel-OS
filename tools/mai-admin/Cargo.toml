[package]
name = "mai-admin"
description = "MAI operator tooling: backup/restore, audit/trust/vault verification"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
# BRAND-01: shipped binary carries the `lamprey-mai-*` naming. The
# crate name (`mai-admin`) stays as-is internally.
name = "lamprey-mai-admin"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = "1"
chrono = { workspace = true }
sha3 = "0.10"
hex = "0.4"
ml-dsa = "0.0.4"
rand = "0.8"

# WELCOME-01: narrated `demo` subcommand drives the compliance engine
# directly (PHI / ITAR / EAR / OCAP detectors, composer, audit log,
# certified report manager). Same APIs the `mai-compliance` integration
# tests use, called from a literate runner that prints what each step
# does.
mai-compliance = { path = "../../mai-compliance" }
mai-core = { path = "../../mai-core" }

# This crate vendors a minimal `BackupSourceProfile` + `AuditEntry` +
# `verify_chain` rather than depend on `mai-api`. Reason: the parallel
# endpoint-and-cli session is mid-edit on `mai-api/src/errors.rs`, leaving
# mai-api un-buildable in the shared workspace. Same precedent as an earlier
# vendoring (which duplicated `GENESIS_HASH` until a later change unblocked
# it); the duplication should be removed once the endpoint-and-cli session lands.

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true }

[lints]
workspace = true
