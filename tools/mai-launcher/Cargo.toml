[package]
name = "mai-launcher"
description = "MAI front-door launcher: Win32 splash + terminal interface + mai-api supervisor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
# Renders as `lamprey-mai.exe` — the front-door binary users click
# to open the program. Distinct from `lamprey-mai-api.exe` (headless
# service) and `lamprey-mai-admin.exe` (operator tooling). BRAND-01
# rebrand: short `mai.exe` was the WELCOME-01 ship; consistent
# `lamprey-mai-*` naming makes the package self-identifying.
name = "lamprey-mai"
path = "src/main.rs"

# build.rs (auto-detected in the package root) compiles lamprey-mai.rc
# into the .exe so Explorer + taskbar show the Lamprey icon. The build
# script no-ops on non-Windows hosts via cfg-gating.

[dependencies]
anyhow = "1"

# Win32 splash dependencies are Windows-only: the `windows` crate's
# `Win32_*` feature modules do not exist on other targets, so pulling
# them in unconditionally breaks `cargo check --workspace` on the
# Linux CI runner. The launcher ships as `mai.exe`; on non-Windows
# hosts the splash module compiles as a stub that returns an error,
# which `main.rs` already degrades to a text-only welcome.
[target.'cfg(windows)'.dependencies]
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(windows)'.dependencies.windows]
version = "0.58"
features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_Console",
    "Win32_System_LibraryLoader",
    "Win32_UI_WindowsAndMessaging",
]

# Compiles the .rc file at build time. Windows-only build dep so the
# Linux CI runner doesn't try to pull in rc.exe / windres.
[target.'cfg(windows)'.build-dependencies]
embed-resource = "2.5"

# Override the workspace `unsafe_code = forbid` because the splash
# module necessarily uses Win32 calls. Everything else inherits the
# workspace lints (clippy::all + clippy::pedantic as warn).
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
doc_markdown = "allow"
too_many_lines = "allow"
cognitive_complexity = "allow"
wildcard_imports = "allow"
