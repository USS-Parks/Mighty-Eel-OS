# cargo-audit configuration for the MAI workspace.
#
# J-10b: cargo-audit and cargo-deny check the same RustSec database
# but have separate config surfaces. This file mirrors the
# `[advisories].ignore` block in `deny.toml`, with the same rationale.
# The human-readable explanation for every entry lives in
# `docs/compliance/INDEPENDENT-EVIDENCE-DEFERRALS.md`; keep this file
# synced with that doc AND with deny.toml on every change.
#
# Do not add an ignore here that does not also exist in
# INDEPENDENT-EVIDENCE-DEFERRALS.md. A silent ignore here would defeat
# the auditability goal of J-10b.

[advisories]
ignore = [
    # RUSTSEC-2025-0144 - ml-dsa 0.0.4 timing side-channel.
    # Fix is a semver-incompatible 0.1.0-rc.3 upgrade that breaks
    # mai-vault, mai-compliance, mai-admin. Mitigated by air-gap
    # deployment; deferred to the post-RC1 dependency-refresh lane.
    "RUSTSEC-2025-0144",

    # RUSTSEC-2024-0384 - instant 0.1.13 unmaintained.
    # Transitive via notify 7.0.0 -> notify-types -> instant. No
    # semver upgrade available without replacing `notify`. Deferred
    # to the post-RC1 dependency-refresh lane.
    "RUSTSEC-2024-0384",

    # RUSTSEC-2026-0176 / RUSTSEC-2026-0177 - pyo3 0.24.2.
    # OOB read in PyList/PyTuple nth iterators; missing Sync bound on
    # PyCFunction::new_closure. NEITHER API is used anywhere in the
    # workspace (grep: zero occurrences of new_closure / PyList /
    # PyTuple / .nth on Py* iterators). pyo3 is used only by mai-adapters
    # (parked, off the WSF/AOG trust path) via the safe bridge surface.
    # Fix is a 0.24 -> 0.29 major bump into the parked FFI layer; deferred
    # to the mai-adapters revival rather than churned for a non-reachable
    # advisory. See INDEPENDENT-EVIDENCE-DEFERRALS.md §1.4.
    "RUSTSEC-2026-0176",
    "RUSTSEC-2026-0177",

    # RUSTSEC-2026-0173 - proc-macro-error2 2.0.1 unmaintained.
    # Compile-time-only proc-macro pulled transitively via
    # validator_derive 0.20 (mai-api -> validator 0.20). validator 0.20.0
    # is the latest release so no upgrade drops it; the advisory confirms
    # no safe upgrade is available. Not linked into any runtime binary and
    # off the trust path. Deferred to the post-RC1 dependency-refresh lane.
    # See INDEPENDENT-EVIDENCE-DEFERRALS.md §1.5.
    "RUSTSEC-2026-0173",

    # NOTE: RUSTSEC-2024-0436 (paste) was removed here in SOV-0.2b — paste
    # was transitive via pqcrypto-mldsa, which was dropped when the
    # archived pqc-prod backend was removed. paste is no longer in the tree.
]
