name: MAI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Rust Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --workspace

      - name: Lint (clippy)
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --check

      - name: Unit tests
        run: cargo test --workspace

      - name: Verify no unsafe in mai-core
        run: |
          # Strip comments before grepping so doc-comments mentioning
          # "unsafe" don't cause false positives.  The workspace lint
          # unsafe_code = "deny" is the real enforcement; this is a
          # belt-and-suspenders check.
          if grep -rn "unsafe" mai-core/src/ | grep -v '^\s*//' | grep -v '//.*unsafe'; then
            echo "ERROR: unsafe code found in mai-core"
            exit 1
          fi
          echo "OK: no unsafe in mai-core"

  python-check:
    name: Python Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-asyncio
          pip install -e mai-sdk-python[dev]

      - name: Lint (ruff)
        run: ruff check adapters/ mai-sdk-python/

      - name: Type check (mypy)
        run: mypy --strict adapters/ mai-sdk-python/src/
        continue-on-error: true  # Strict until adapters have full type coverage

      - name: Unit tests
        run: pytest adapters/ mai-sdk-python/ -v --ignore=**/test_integration*

