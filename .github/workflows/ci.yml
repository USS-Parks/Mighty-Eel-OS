name: MAI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly integration: 2am UTC daily (uncomment integration job when GPU runner available)
  # Weekly benchmarks: 3am UTC Sunday (uncomment benchmarks job when GPU runner available)
  # schedule:
  #   - cron: '0 2 * * *'   # nightly
  #   - cron: '0 3 * * 0'   # weekly Sunday

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Rust Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --workspace

      - name: Lint (clippy)
        run: cargo clippy --workspace -- -D warnings -A clippy::pedantic

      - name: Format check
        run: cargo fmt --check

      - name: Unit tests
        run: cargo test --workspace

      - name: Verify no unsafe in mai-core
        run: |
          if grep -rn "unsafe" mai-core/src/ | grep -v '^\s*//' | grep -v '//.*unsafe'; then
            echo "ERROR: unsafe code found in mai-core"
            exit 1
          fi
          echo "OK: no unsafe in mai-core"

  python-check:
    name: Python Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-asyncio
          pip install -e "mai-sdk-python[dev]"

      - name: Lint (ruff)
        run: ruff check adapters/ mai-sdk-python/

      - name: Type check (mypy)
        run: mypy --strict adapters/ mai-sdk-python/src/
        continue-on-error: true

      - name: Unit tests
        run: pytest adapters/ mai-sdk-python/ -v --ignore=**/test_integration*

  # CI-safe integration tests (no GPU required, runs on every PR)
  # Uses mock adapters; tests the Rust MAI stack only.
  integration-ci:
    name: Integration Tests (CI, No GPU)
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run mai-core integration tests
        run: cargo test -p mai-core --test integration_lifecycle -- --nocapture
      - name: Run mai-adapters CI integration tests
        run: cargo test -p mai-adapters --test e2e_integration -- --nocapture

  # CI-safe benchmarks (no GPU, structural validation only)
  benchmarks-ci:
    name: Benchmark Validation (CI, No GPU)
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmark suite (simulated)
        run: cargo test -p mai-adapters --features benchmark --test benchmarks -- --nocapture

