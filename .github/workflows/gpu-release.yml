name: MAI GPU Release

# SHIP-13: self-hosted GPU release workflow.
#
# Runs the full GPU acceptance path that the no-GPU PR CI can only stub:
# build with release flags, GPU-required integration suites, full
# benchmark suite with regression detection + threshold enforcement,
# .deb package build against the release binaries, signed release
# bundle. Triggered by release tags, manual dispatch, or the weekly
# Sunday burn-in slot.
#
# Self-hosted runner requirements:
#   - label set: [self-hosted, gpu, mai-release]
#   - NVIDIA driver + nvidia-smi present
#   - protoc, dpkg-buildpackage, debhelper installed
#   - Ollama or stub adapter listening on localhost:11434 for the
#     adapter integration step (optional; covered by feature flag)
#
# Artifacts published per run:
#   - benchmark-results-<run>.tar.gz  (every bench_*.json under
#     tests/benchmarks/results/)
#   - readiness-report-<run>.json     (mai-api validate --json)
#   - mai_<version>_amd64.deb         (when dpkg-buildpackage succeeds)
#   - release-bundle-<commit>.tar.gz  (signed manifest + every artifact)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      regression_threshold_pct:
        description: 'Regression gate threshold (percent)'
        required: false
        default: '20'
      skip_package:
        description: 'Skip .deb build (faster iteration)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Weekly: Sunday 04:00 UTC. Pairs with the SHIP-14 burn-in slot.
    - cron: '0 4 * * 0'

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GPU_RELEASE_PROFILE: deployment/ship/profile.toml
  GPU_RELEASE_THRESHOLDS: config/gpu-release-thresholds.toml

jobs:
  gpu-build:
    name: GPU Release Build
    runs-on: [self-hosted, gpu, mai-release]
    timeout-minutes: 60
    outputs:
      release_version: ${{ steps.version.outputs.value }}
      release_commit: ${{ steps.version.outputs.commit }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="0.0.0-dev+$(git rev-parse --short HEAD)"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: nvidia-smi sanity
        run: nvidia-smi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --workspace --release

      - name: Smoke check release binary
        # BRAND-01 renamed the mai-api crate's default binary from
        # `mai-api` to `lamprey-mai-api`. HF-1 sync.
        run: |
          ./target/release/lamprey-mai-api --version
          ./target/release/lamprey-mai-api validate --profile "${GPU_RELEASE_PROFILE}" --json > readiness-report.json
        continue-on-error: true

      - name: Upload readiness report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: readiness-report-${{ github.run_number }}
          path: readiness-report.json
          if-no-files-found: warn
          retention-days: 30

  gpu-integration:
    name: GPU Integration Tests
    runs-on: [self-hosted, gpu, mai-release]
    timeout-minutes: 45
    needs: [gpu-build]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Probe Ollama (best-effort)
        run: |
          if ! curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1; then
            echo "WARN: Ollama not reachable, integration steps that require it will skip"
          fi
      - name: mai-core integration
        run: cargo test -p mai-core --test integration_lifecycle --release -- --nocapture
      - name: mai-adapters integration (GPU feature)
        run: cargo test -p mai-adapters --features integration --release -- --nocapture
      - name: mai-adapters E2E (GPU feature)
        run: cargo test -p mai-adapters --features integration --release --test e2e_integration -- --nocapture

  gpu-benchmarks:
    name: GPU Benchmarks + Threshold Gate
    runs-on: [self-hosted, gpu, mai-release]
    timeout-minutes: 60
    needs: [gpu-build]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run benchmark suite
        id: bench
        run: |
          cargo test -p mai-adapters --features benchmark --release -- --nocapture 2>&1 \
            | tee bench_output.txt

      - name: Store results
        run: cat bench_output.txt | python3 tests/benchmarks/bench_compare.py store

      - name: Compare with previous run (advisory)
        run: python3 tests/benchmarks/bench_compare.py compare
        continue-on-error: true

      - name: Enforce threshold gate
        env:
          REGRESSION_PCT: ${{ github.event.inputs.regression_threshold_pct }}
        run: |
          extra=""
          if [[ -n "${REGRESSION_PCT}" ]]; then
            extra="--regression-pct ${REGRESSION_PCT}"
          fi
          python3 tests/benchmarks/bench_compare.py gate \
            --thresholds "${GPU_RELEASE_THRESHOLDS}" \
            --json gate-report.json \
            ${extra}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results-${{ github.run_number }}
          path: |
            tests/benchmarks/results/
            bench_output.txt
            gate-report.json
          if-no-files-found: warn
          retention-days: 90

  gpu-package:
    name: GPU Release Package
    runs-on: [self-hosted, gpu, mai-release]
    timeout-minutes: 30
    needs: [gpu-build, gpu-integration, gpu-benchmarks]
    if: ${{ github.event.inputs.skip_package != 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build .deb
        run: scripts/build-package.sh --version "${{ needs.gpu-build.outputs.release_version }}"
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: mai-deb-${{ github.run_number }}
          path: build/package-staging/**/*.deb
          if-no-files-found: error
          retention-days: 90

  gpu-bundle:
    name: Signed Release Bundle
    runs-on: [self-hosted, gpu, mai-release]
    timeout-minutes: 15
    needs: [gpu-build, gpu-integration, gpu-benchmarks, gpu-package]
    if: always() && needs.gpu-build.result == 'success'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          path: bundle-input/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Assemble release bundle
        run: |
          scripts/gpu-release-bundle.sh \
            --version "${{ needs.gpu-build.outputs.release_version }}" \
            --commit "${{ needs.gpu-build.outputs.release_commit }}" \
            --input bundle-input \
            --output build/release-bundle
      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle-${{ needs.gpu-build.outputs.release_commit }}
          path: build/release-bundle/
          if-no-files-found: error
          retention-days: 365
