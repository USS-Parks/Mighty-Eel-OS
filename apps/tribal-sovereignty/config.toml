# Tribal Data Sovereignty Demo scaffold
#
# Local-only protected data example. Demonstrates the OCAP path:
# a TrustClaim with compliance_scopes=["ocap"] and
# allowed_routes=["local_only"] is constructed locally (mocking the
# Trust Manifold issuance flow); any operation that would leave the
# local node is refused before it touches the wire.

[client]
# Inherits MAI_BASE_URL / MAI_API_KEY from environment.

[trust]
# Mock claim — local-dev only. Real claims arrive signed from the
# Cloud OpenBao Trust Bridge once it is live.
tenant_id              = "nation-of-example"
subject_id             = "elder-marie"
subject_hash           = "hmac-placeholder"
roles                  = ["elder", "cultural_steward"]
compliance_scopes      = ["ocap"]
allowed_routes         = ["local_only"]
allowed_models         = ["qwen3-14b:Q4_K_M"]
max_data_classification = "tribal_protected"
service_identity       = "lamprey-router"
trust_bundle_version   = "local-dev"
claim_id               = "local-dev-claim"
offline_mode           = false
revocation_status      = "unknown"

[corpus]
# Files in this directory carry the OCAP protected classification.
# The scaffold refuses to send their content to any non-local route.
data_dir = "protected_data"

[chat]
chat_model  = "qwen3-14b:Q4_K_M"
temperature = 0.3
max_tokens  = 256
