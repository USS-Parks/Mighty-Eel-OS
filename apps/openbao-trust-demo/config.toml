# OpenBao-Backed Local Trust Demo
#
# Demonstrates the cloud-OpenBao-Core -> Lamprey-Trust-Bridge ->
# Local-Trust-Cache ring described in docs/compliance/TRUST-MANIFOLD.md
# and docs/operations/OPENBAO-INTEGRATION.md.
#
# Pipeline:
#   1. user authenticates through the (simulated) cloud trust bridge
#   2. a short-lived TrustClaim is issued
#   3. local MAI's trust cache state is checked
#   4. claim is exchanged for a session token
#   5. Lamprey-ready audit metadata is built
#   6. an authenticated inference is dispatched
#   7. an audit correlation ID is printed for replay
#
# Once the live cloud bridge lands, ``simulate_bridge_authentication()`` is replaced by
# a real call to the cloud trust bridge and ``client.auth.exchange_token``
# returns a real session token.

[client]
# base_url and api_key fall back to env / $MAI_CONFIG when unset.

[bridge]
# Simulated cloud trust bridge. Never contacted — the demo issues claims
# locally and verifies the format the real bridge would emit.
service_identity = "openbao-trust-bridge"
trust_bundle_version = "local-dev-v1"
# Claim TTL in seconds; 0 = no expiry (debug only).
claim_ttl_seconds = 300

[claim]
# Identity payload the bridge would mint a claim for.
tenant_id = "im-demo"
subject_id = "alice@example.com"
roles = ["operator", "compliance-officer"]
compliance_scopes = ["pii", "phi"]
allowed_routes = ["local_only"]
allowed_models = []
max_data_classification = "confidential"

[audit]
# Prefix for the audit correlation ID. Together with the claim_id and
# a timestamp this yields a stable per-session token usable by the compliance
# audit log (see mai-compliance::audit::AuditCorrelation).
correlation_prefix = "openbao-demo"

[chat]
# Inference parameters for the demo turn.
chat_model = "qwen3-14b:Q4_K_M"
temperature = 0.3
max_tokens = 128
prompt = "Confirm you are answering under a locally-verified trust claim."
