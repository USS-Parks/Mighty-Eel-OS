# Operator/Admin scaffold
#
# Read-only dashboard that pulls model, scheduler, adapter, power, audit,
# and trust-bundle status from the local MAI instance via the SDK.

[client]
# Inherits MAI_BASE_URL / MAI_API_KEY.

[display]
# Which panels to show. Set false to skip (useful for partial deployments).
models      = true
scheduler   = true
adapters    = true
power       = true
audit       = true   # placeholder column until the audit view is wired in
trust       = true   # placeholder — currently shows stub state
airgap      = true

# Audit preview row count.
audit_limit = 10
