# Root-level Python tooling config.
# Ensures ruff/mypy apply consistent rules to ALL Python code (adapters/, mai-sdk-python/, etc.)
# The mai-sdk-python/pyproject.toml inherits from this via ruff's config resolution.

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "A",   # flake8-builtins
    "COM", # flake8-commas
    "C4",  # flake8-comprehensions
    "ISC", # flake8-implicit-str-concat
    "PIE", # flake8-pie
    "PT",  # flake8-pytest-style
    "RSE", # flake8-raise
    "RET", # flake8-return
    "SIM", # flake8-simplify
    "TID", # flake8-tidy-imports
    "ARG", # flake8-unused-arguments
    "PL",  # pylint
    "PERF", # perflint
    "RUF", # ruff-specific
]
# Excluded from mai-sdk-python's aggressive list:
# ANN (strict type annotations - too noisy for adapter stubs using Any)
# S (bandit security - enable when real implementations land)
# TCH (type-checking imports - premature for stubs)
# TRY (tryceratops - too strict for exception hierarchies)
# ERA (commented-out code - stubs have intentional comment examples)
# FLY (flynt - minimal impact)
# ICN (import conventions - not needed yet)

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ARG001"]
"**/tests/**/*.py" = ["S101", "ARG001"]
# Adapter stubs are mostly empty __init__.py files
"adapters/**/__init__.py" = ["D104"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: requires real MAI instance",
]
